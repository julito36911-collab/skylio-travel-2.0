<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Londres - Skylio Destinos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>
<body class="bg-[#0a0f16] text-gray-300">

  <!-- CAPA 1: HERO SECTION -->
  <header class="relative w-full h-[60vh] min-h-[400px] flex flex-col justify-center items-center text-center px-4 overflow-hidden">
    <!-- Background Image / Gradient -->
    <div class="absolute inset-0 bg-gradient-to-b from-blue-900/40 via-[#0a0f16]/80 to-[#0a0f16] -z-10"></div>
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1600&q=80')] bg-cover bg-center object-cover opacity-30 mix-blend-overlay -z-20"></div>
    
    <!-- Hero Content -->
    <div class="max-w-4xl mx-auto space-y-6">
      <h1 class="text-5xl md:text-7xl font-serif text-white font-bold tracking-wide">
        Londres
      </h1>
      <p class="text-xl md:text-2xl text-gray-200 font-light max-w-2xl mx-auto">
        La guía definitiva: Transporte, Visas, Hoteles y secretos locales.
      </p>
    </div>
  </header>

  <!-- CAPA 1: CONTENEDOR MAESTRO -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- CAPA 1: EL GRID DE 2 COLUMNAS (Esqueleto) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
      
      <!-- COLUMNA IZQUIERDA (Contenido Principal) -->
      <div class="lg:col-span-8 space-y-12" id="columna-izquierda">
        <h2 class="text-2xl text-white font-bold border-b border-white/10 pb-4">CONTENIDO PRINCIPAL</h2>
        <!-- Futuras capas de contenido irán aquí -->
      </div>
      
      <!-- COLUMNA DERECHA (Sidebar Sticky) -->
      <aside class="lg:col-span-4 sticky top-8 self-start space-y-8" id="columna-derecha">
        <h2 class="text-xl text-white font-bold border-b border-white/10 pb-4">SIDEBAR UTILIDADES</h2>
        <!-- Futuras utilidades irán aquí -->
      </aside>
      
    </div>

  </main>

</body>
</html>
