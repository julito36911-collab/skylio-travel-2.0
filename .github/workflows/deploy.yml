name: Deploy Skylio a Hostinger

on:
  push:
    branches:
      - prueva-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build de produccion
        working-directory: ./frontend
        run: npm run build

      - name: Preparar permisos locales antes de subir
        run: |
          find ./frontend/build -type d -exec chmod 755 {} \;
          find ./frontend/build -type f -exec chmod 644 {} \;

      - name: DIAGNOSTICO - Ver donde estamos en FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y -qq lftp > /dev/null 2>&1
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            echo '=== RAIZ FTP (pwd) ===';
            pwd;
            echo '=== CONTENIDO DE LA RAIZ ===';
            ls;
            echo '=== CONTENIDO DE /public_html/ ===';
            ls /public_html/ || echo 'NO EXISTE /public_html/';
            echo '=== CONTENIDO DE ./public_html/ ===';
            ls ./public_html/ || echo 'NO EXISTE ./public_html/';
            bye
          "

      - name: Subir build a Hostinger via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set net:max-retries 3;
            set net:timeout 30;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror --reverse --delete --verbose --parallel=5 ./frontend/build/ /public_html/;
            echo '=== VERIFICACION DESPUES DE SUBIR ===';
            ls /public_html/;
            echo '=== VERIFICAR index.html ===';
            ls -la /public_html/index.html || echo 'NO HAY index.html';
            bye
          "
